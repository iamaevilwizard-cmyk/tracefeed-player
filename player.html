<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="color-scheme" content="dark" />
  <title>Tracefeed Player</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      touch-action: none;
    }

    #playerWrap {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
      display: block;
    }

    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: #000;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 5;
    }

    #fallback strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
    }

    #fallback p {
      margin: 0;
      color: rgba(255,255,255,.65);
      font-size: 14px;
      line-height: 1.45;
    }
  </style>
</head>

<body>
  <div id="playerWrap">
    <iframe
      id="player"
      title="TikTok player"
      allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
  </div>

  <div id="fallback">
    <div>
      <strong>No video loaded</strong>
      <p>Tracefeed did not pass a TikTok video ID to the bridge player.</p>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const TIKTOK_ORIGIN = "https://www.tiktok.com";
      const player = document.getElementById("player");
      const fallback = document.getElementById("fallback");

      let currentVideoId = "";
      let cookiePollTimer = 0;
      let cookieReadySent = false;

      function extractVideoId(value) {
        const text = decodeURIComponent(String(value || ""));

        const patterns = [
          /\/video\/(\d{5,})/i,
          /\/share\/video\/(\d{5,})/i,
          /(?:video_id|item_id|aweme_id)=?(\d{5,})/i,
          /\b(\d{17,22})\b/
        ];

        for (const pattern of patterns) {
          const match = text.match(pattern);
          if (match) return match[1];
        }

        return "";
      }

      function getInitialVideoId() {
        const params = new URLSearchParams(location.search);

        return (
          extractVideoId(params.get("videoId")) ||
          extractVideoId(params.get("id")) ||
          extractVideoId(params.get("url")) ||
          extractVideoId(location.hash)
        );
      }

      function makeTikTokPlayerUrl(videoId) {
        const params = new URLSearchParams({
          autoplay: "1",
          controls: "1",
          description: "0",
          music_info: "0",
          rel: "0"
        });

        return `${TIKTOK_ORIGIN}/player/v1/${encodeURIComponent(videoId)}?${params.toString()}`;
      }

      function hasTikTokCookiesFromNative() {
        try {
          if (
            window.TracefeedNative &&
            typeof window.TracefeedNative.hasTikTokCookies === "function"
          ) {
            return !!window.TracefeedNative.hasTikTokCookies();
          }
        } catch (e) {}

        return false;
      }

      function flushTikTokCookiesFromNative() {
        try {
          if (
            window.TracefeedNative &&
            typeof window.TracefeedNative.flushTikTokCookies === "function"
          ) {
            window.TracefeedNative.flushTikTokCookies();
          }
        } catch (e) {}
      }

      function notifyTracefeedNeedsCookies() {
        forwardToTracefeed({
          "x-tracefeed-player": true,
          type: "tiktokCookiesNeeded",
          videoId: currentVideoId
        });
      }

      function notifyTracefeedCookiesReady() {
        if (cookieReadySent) return;

        cookieReadySent = true;
        flushTikTokCookiesFromNative();

        forwardToTracefeed({
          "x-tracefeed-player": true,
          type: "tiktokCookiesReady",
          videoId: currentVideoId
        });
      }

      function startCookiePolling() {
        stopCookiePolling();

        if (hasTikTokCookiesFromNative()) {
          notifyTracefeedCookiesReady();
          return;
        }

        notifyTracefeedNeedsCookies();

        cookiePollTimer = window.setInterval(() => {
          if (hasTikTokCookiesFromNative()) {
            stopCookiePolling();
            notifyTracefeedCookiesReady();
          }
        }, 500);
      }

      function stopCookiePolling() {
        if (cookiePollTimer) {
          clearInterval(cookiePollTimer);
          cookiePollTimer = 0;
        }
      }

      function loadVideo(videoId) {
        videoId = extractVideoId(videoId);

        if (!videoId) {
          fallback.style.display = "grid";
          player.removeAttribute("src");
          currentVideoId = "";
          stopCookiePolling();
          return;
        }

        fallback.style.display = "none";

        if (videoId === currentVideoId && player.src) {
          startCookiePolling();
          return;
        }

        currentVideoId = videoId;
        cookieReadySent = false;
        player.src = makeTikTokPlayerUrl(videoId);

        startCookiePolling();
      }

      function forwardToTikTok(message) {
        if (!player.contentWindow) return;
        player.contentWindow.postMessage(message, TIKTOK_ORIGIN);
      }

      function forwardToTracefeed(message) {
        if (!window.parent || window.parent === window) return;
        window.parent.postMessage(message, "*");
      }

      window.addEventListener("message", event => {
        const message = event.data;

        if (!message || typeof message !== "object") return;

        if (event.source === player.contentWindow) {
          forwardToTracefeed(message);
          return;
        }

        if (message.type === "loadVideo" && message.videoId) {
          loadVideo(message.videoId);
          return;
        }

        if (message.type === "loadVideo" && message.url) {
          loadVideo(message.url);
          return;
        }

        if (message.type === "checkTikTokCookies") {
          startCookiePolling();
          return;
        }

        if (message["x-tiktok-player"] === true) {
          forwardToTikTok(message);
          return;
        }
      });

      player.addEventListener("load", () => {
        forwardToTracefeed({
          "x-tiktok-player": true,
          type: "bridgeLoaded",
          videoId: currentVideoId
        });

        startCookiePolling();

        setTimeout(() => {
          forwardToTikTok({
            "x-tiktok-player": true,
            type: "unMute"
          });

          forwardToTikTok({
            "x-tiktok-player": true,
            type: "play"
          });
        }, 450);
      });

      window.addEventListener("beforeunload", stopCookiePolling);

      loadVideo(getInitialVideoId());
    })();
  </script>
</body>
</html>
