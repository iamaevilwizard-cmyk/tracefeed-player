<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <iframe
    id="player"
    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    const player = document.getElementById("player");

    if (id) {
      const embedParams = new URLSearchParams({
        autoplay: "1",
        controls: "1",
        description: "0",
        music_info: "0",
        rel: "0"
      });

      player.src = `https://www.tiktok.com/player/v1/${encodeURIComponent(id)}?${embedParams}`;
    }

    window.addEventListener("message", event => {
      const msg = event.data;

      // Forward Tracefeed commands into TikTok player
      if (msg && msg["x-tiktok-player"] === true && player.contentWindow) {
        player.contentWindow.postMessage(msg, "https://www.tiktok.com");
      }

      // Forward TikTok player events back to Tracefeed
      if (String(event.origin || "").includes("tiktok.com")) {
        window.parent.postMessage(msg, "*");
      }
    });
  </script>
</body>
</html>
